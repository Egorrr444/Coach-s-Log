{% extends "base.html" %}

{% block title %}Посещаемость{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Журнал посещаемости</h1>

<form method="post" action="/attendance-submit/{{ data.training_id }}">
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table">
                <thead>
                    <tr>
                        <th>Ученик</th>
                        <th>Присутствовал</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in data.students %}
                    <tr>
                        <td>{{ s.full_name }}</td>
                        <td>
                            <input
                                type="checkbox"
                                name="student_{{ s.student_id }}"
                                {% if s.status == "present" %}checked{% endif %}
                            >
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <button type="submit" class="btn btn-success">
                Сохранить
            </button>

        </div>
    </div>
</form>
{% endblock %}
